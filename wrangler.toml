# Cloudflare Pages configuration for Atlase.
# Bindings below are used by `wrangler pages dev` (local) and `wrangler pages deploy`.
# For the hosted Pages project, mirror these bindings in the Cloudflare dashboard
# (Settings -> Functions -> Bindings) for both Production and Preview environments.

name = "atlase"
pages_build_output_dir = "dist"
compatibility_date = "2024-11-06"
compatibility_flags = ["nodejs_compat"]

# --- D1 (SQL database) ---
# Create with: wrangler d1 create atlase-db
# Then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "atlase-db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"
migrations_dir = "migrations"

# --- R2 (media/object storage) ---
# Create with: wrangler r2 bucket create atlase-media
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "atlase-media"
preview_bucket_name = "atlase-media-preview"

# --- KV (sessions, rate limits, short-lived tokens) ---
# Create with: wrangler kv namespace create CACHE
[[kv_namespaces]]
binding = "CACHE"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_NAMESPACE_ID"

# Non-secret runtime configuration. Secrets (session keys, provider API keys)
# must be set via `wrangler pages secret put <NAME>` or the dashboard — never here.
[vars]
ENVIRONMENT = "production"
PUBLIC_STORE_NAME = "Atlase"
PUBLIC_CURRENCY = "PHP"
PUBLIC_LOCALE = "en-PH"

# Preview deployments can override vars/bindings.
[env.preview.vars]
ENVIRONMENT = "preview"
PUBLIC_STORE_NAME = "Atlase (Preview)"
PUBLIC_CURRENCY = "PHP"
PUBLIC_LOCALE = "en-PH"
